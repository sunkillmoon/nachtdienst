<!--
  Nachtkaart magic-link sign-in email.

  Paste into: Supabase Dashboard -> Authentication -> Email Templates -> Magic Link.
  Subject line:  YOUR NACHTKAART SIGN-IN LINK

  Deliberately light-mode / monochrome (email inboxes are mostly light; the site's
  dark theme would fight them). All styles inline — email clients strip <style>
  and classes. No images. {{ .ConfirmationURL }} is Supabase's magic-link variable.
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#ffffff;">
  <tr>
    <td align="center" style="padding:32px 16px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;font-family:'Courier New',Courier,ui-monospace,monospace;color:#0a0a0a;">
        <tr>
          <td style="font-size:20px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;padding-bottom:22px;">
            NACHT<span style="color:#6b8e00;">/</span>KAART
          </td>
        </tr>
        <tr>
          <td style="font-size:14px;line-height:1.6;padding-bottom:24px;">
            Tap to sign in. No password needed.
          </td>
        </tr>
        <tr>
          <td style="padding-bottom:24px;">
            <a href="{{ .ConfirmationURL }}" style="display:inline-block;font-family:'Courier New',Courier,monospace;font-size:13px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;color:#0a0a0a;text-decoration:none;border:2px solid #0a0a0a;padding:13px 22px;">
              Sign in &rarr;
            </a>
          </td>
        </tr>
        <tr>
          <td style="font-size:12px;line-height:1.6;color:#666666;padding-bottom:24px;">
            Or paste this link into your browser:<br>
            <span style="color:#0a0a0a;word-break:break-all;">{{ .ConfirmationURL }}</span>
          </td>
        </tr>
        <tr>
          <td style="font-size:12px;line-height:1.6;color:#666666;padding-bottom:24px;">
            This link expires in an hour and works once. If you didn't request it, you can ignore this email.
          </td>
        </tr>
        <tr>
          <td style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#999999;border-top:1px solid #dddddd;padding-top:16px;">
            Nachtkaart &mdash; wat er vannacht draait in NL
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
