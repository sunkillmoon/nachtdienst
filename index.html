<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NACHTKAART — Amsterdam, Tonight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet">
<link rel="manifest" href="manifest.json?v=5543d71ab7">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nachtkaart">
<style>
  :root{
    color-scheme: dark;
    --bg:       #0A0A0A;
    --surface:  #111111;
    --line:     #2A2A2A;
    --text:     #EDEDED;
    --text-dim: #8A8A8A;
    --accent:   #B4FF00;
    --danger:   #FF3B30;
    --font-display: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
    --font-mono: "Space Mono", "JetBrains Mono", ui-monospace, monospace;
  }

  *{ box-sizing:border-box; margin:0; padding:0; border-radius:0 !important; }

  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-mono);
    -webkit-font-smoothing:antialiased;
  }

  body{ min-height:100vh; overflow-x:hidden; }

  a{ color:var(--accent); text-decoration:underline; text-underline-offset:2px; }
  a:hover{ text-decoration:none; }

  button{
    font-family:var(--font-mono);
    background:var(--surface);
    color:var(--text);
    border:1px solid var(--line);
    cursor:pointer;
    min-height:44px;
  }

  :focus-visible{ outline:1px solid var(--accent); outline-offset:2px; }

  .wrap{ max-width:960px; margin:0 auto; padding-bottom:2rem; }

  /* ---------- header ---------- */
  header{
    display:flex; align-items:baseline; justify-content:space-between;
    padding:14px 16px 10px;
    border-bottom:1px solid var(--line);
  }
  .brand{
    font-family:var(--font-display);
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:-0.02em;
    font-size:20px;
  }
  .brand .brand-dot{ color:var(--accent); }
  .meta{
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    text-align:right;
  }
  .meta .dot{
    display:inline-block; width:6px; height:6px;
    background:var(--accent); margin-right:6px;
    vertical-align:middle;
  }
  .auth-control{
    margin-top:4px;
    display:flex; align-items:center; justify-content:flex-end; gap:8px;
  }
  .auth-btn{
    font-family:var(--font-mono);
    font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
    background:none; border:1px solid var(--line); color:var(--text-dim);
    padding:2px 8px; min-height:auto; cursor:pointer;
  }
  .auth-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .auth-email{
    font-size:10px; color:var(--text-dim); max-width:120px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* ---------- ticker ---------- */
  .ticker{
    border-bottom:1px solid var(--line);
    overflow:hidden;
    white-space:nowrap;
    background:var(--surface);
  }
  .ticker-track{
    display:inline-flex;
    padding:8px 0;
    font-size:12px;
    letter-spacing:0.02em;
    will-change: transform;
  }
  .ticker-track span.item{ padding:0 14px; color:var(--text); }
  .ticker-track span.item .v{ color:var(--accent); }
  .ticker-track span.sep{ color:var(--text-dim); }

  /* Animation itself is driven by app.js (Web Animations API) so it can
     measure content width for a constant px/sec speed and stay iOS-safe;
     this just leaves manual horizontal scroll available when motion is off. */
  @media (prefers-reduced-motion: reduce){
    .ticker{ overflow-x:auto; }
  }

  /* ---------- stepper ---------- */
  .stepper{
    display:flex; gap:0;
    border-bottom:1px solid var(--line);
  }
  .stepper-btn{
    width:56px;
    flex:none;
    border:none;
    border-right:1px solid var(--line);
    font-size:14px;
    color:var(--text-dim);
    background:var(--bg);
  }
  .stepper-btn:last-child{ border-right:none; }
  .stepper-btn:disabled{ cursor:not-allowed; opacity:0.35; }
  .stepper-label-wrap{
    flex:1;
    position:relative;
    border-right:1px solid var(--line);
    border-left:1px solid var(--line);
  }
  .stepper-label{
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-weight:700;
    background:none;
    border:none;
    color:var(--text);
    cursor:pointer;
  }
  .date-picker-input{
    position:absolute; inset:0;
    opacity:0;
    width:100%; height:100%;
    border:none;
    pointer-events:none;
  }
  /* Fallback for browsers without showPicker(): make the real native input
     tappable and legible instead of relying on a JS-triggered call that
     can't work there. */
  .date-picker-input.visible-fallback{
    opacity:1;
    pointer-events:auto;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-align:center;
  }

  /* ---------- geolocation notice ---------- */
  .geo-notice{
    padding:6px 16px;
    font-size:10px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-dim);
    border-bottom:1px solid var(--line);
    background:var(--surface);
  }
  .geo-notice.hidden{ display:none; }

  /* ---------- map ---------- */
  .map{
    height:45vh;
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .marker{
    min-width:20px; height:20px;
    padding:0 3px;
    display:flex; align-items:center; justify-content:center;
    border:1px solid var(--accent);
    background:var(--bg);
    color:var(--accent);
    font-family:var(--font-mono);
    font-size:9px;
    font-weight:700;
    letter-spacing:0.02em;
    cursor:pointer;
  }
  .marker img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .marker.active,
  .marker.live{
    background:var(--accent);
    color:var(--bg);
  }
  .marker:hover,
  .marker.active,
  .marker.live{
    z-index:1;
  }

  .maplibregl-ctrl-attrib{
    background:var(--surface) !important;
    color:var(--text-dim) !important;
    font-family:var(--font-mono) !important;
    font-size:10px !important;
  }
  .maplibregl-ctrl-attrib a{ color:var(--text-dim) !important; }
  .maplibregl-ctrl-bottom-right{ right:0; bottom:0; }

  @media (min-width:700px){
    .map{ height:340px; }
  }

  /* ---------- list ---------- */
  .list-head{
    display:none;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    padding:8px 16px;
    border-bottom:1px solid var(--line);
  }

  .row{
    display:block;
    width:100%;
    text-align:left;
    background:var(--surface);
    border:none;
    border-bottom:1px solid var(--line);
    color:var(--text);
    padding:10px 16px;
    min-height:44px;
  }
  .row:hover{ background:#161616; }
  .row:active{ background:#1a1a1a; }
  .row.active{ border-left:2px solid var(--accent); }
  .row.ended{ color:var(--text-dim); }
  .row.ended .row-venue{ color:var(--text-dim); }

  .row-top{
    display:flex; align-items:baseline; gap:10px;
    margin-bottom:4px;
  }
  .row-time{
    font-weight:700;
    font-size:13px;
    white-space:nowrap;
  }
  .row-title{ flex:1; min-width:0; }
  .row-event{
    font-family:var(--font-display);
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:-0.01em;
    font-size:14px;
    display:block;
  }
  .row-venue{
    font-size:11px;
    color:var(--accent);
  }
  .row-lineup{
    font-size:12px;
    color:var(--text-dim);
    margin-bottom:6px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .row-tags{ display:flex; gap:6px; flex-wrap:wrap; }
  .tag{
    font-size:10px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-dim);
    border:1px solid var(--line);
    padding:2px 6px;
  }
  .tag.danger{ color:var(--danger); border-color:var(--danger); }
  .tag.now{
    color:var(--bg);
    background:var(--accent);
    border-color:var(--accent);
    font-weight:700;
    animation: tag-pulse 2s ease-in-out infinite alternate;
  }
  @keyframes tag-pulse{
    from{ opacity:1; }
    to{ opacity:0.55; }
  }
  @media (prefers-reduced-motion: reduce){
    .tag.now{ animation:none; }
  }

  .row-empty{
    padding:16px;
    font-size:12px;
    letter-spacing:0.04em;
    color:var(--text-dim);
  }

  @media (min-width:700px){
    .list-head{
      display:grid;
      grid-template-columns:92px 1fr 1.3fr auto;
      gap:12px;
    }
    .row{
      display:grid;
      grid-template-columns:92px 1fr 1.3fr auto;
      gap:12px;
      align-items:center;
      padding:8px 16px;
    }
    .row-top{ margin:0; display:contents; }
    .row-time{ grid-column:1; }
    .row-title{ grid-column:2; }
    .row-lineup{ grid-column:3; margin:0; }
    .row-tags{ grid-column:4; justify-content:flex-end; }
  }

  /* ---------- detail panel ---------- */
  .scrim{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.6);
    opacity:0; pointer-events:none;
    transition:opacity 0.2s ease;
    z-index:10;
  }
  .scrim.open{ opacity:1; pointer-events:auto; }

  .panel{
    position:fixed; left:0; right:0; bottom:0;
    max-width:960px; margin:0 auto;
    max-height:88vh;
    overflow-y:auto;
    background:var(--bg);
    border-top:1px solid var(--line);
    transform:translateY(100%);
    transition:transform 0.25s ease;
    z-index:11;
  }
  .panel.open{ transform:translateY(0); }

  @media (prefers-reduced-motion: reduce){
    .scrim, .panel{ transition:none; }
  }

  .panel-handle{
    width:36px; height:4px;
    background:var(--line);
    margin:10px auto;
  }

  .panel-body{ padding:0 16px 24px; }

  .poster{
    width:100%; height:160px;
    margin-bottom:14px;
    background:
      repeating-linear-gradient(45deg, #000 0 2px, #1c1c1c 2px 4px),
      repeating-linear-gradient(-45deg, transparent 0 6px, #000 6px 8px);
    border:1px solid var(--line);
    position:relative;
  }
  .poster::after{
    content:attr(data-label);
    position:absolute; left:8px; bottom:8px;
    font-family:var(--font-display);
    font-weight:700;
    text-transform:uppercase;
    font-size:18px;
    color:var(--accent);
    background:var(--bg);
    padding:2px 6px;
  }
  .poster img{
    width:100%; height:100%;
    object-fit:contain;
    background:#000;
    display:block;
  }
  .poster.has-image::after{ display:none; }
  .poster.has-image{ cursor:pointer; background:#000; }

  /* ---------- lightbox ---------- */
  .lightbox{
    position:fixed; inset:0;
    background:#000;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition:opacity 0.2s ease;
    z-index:20;
    cursor:pointer;
  }
  .lightbox.open{ opacity:1; pointer-events:auto; }
  .lightbox img{
    max-width:100%; max-height:100%;
    object-fit:contain;
  }
  @media (prefers-reduced-motion: reduce){
    .lightbox{ transition:none; }
  }

  .panel h2{
    font-family:var(--font-display);
    text-transform:uppercase;
    letter-spacing:-0.02em;
    font-size:22px;
    margin-bottom:2px;
  }
  .panel .venue-line{
    color:var(--accent);
    font-size:13px;
    margin-bottom:14px;
  }

  .facts{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    border:1px solid var(--line);
    margin-bottom:14px;
  }
  .facts div{
    padding:8px 10px;
    border-right:1px solid var(--line);
  }
  .facts div:last-child{ border-right:none; }
  .facts .k{
    display:block;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:2px;
  }
  .facts .v{ font-size:14px; font-weight:700; }

  .section-label{
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin:16px 0 6px;
  }

  .lineup-list{ list-style:none; border-top:1px solid var(--line); }
  .lineup-list li{
    display:flex; justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .lineup-list li.tba{ color:var(--text-dim); }

  .links-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .link-btn{
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:8px 12px;
    border:1px solid var(--line);
    color:var(--text);
    text-decoration:none;
    display:inline-flex; align-items:center;
    min-height:44px;
  }
  .link-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .link-btn.active{
    background:var(--accent);
    color:var(--bg);
    border-color:var(--accent);
    font-weight:700;
  }

  .rsvp-row{ display:flex; gap:8px; margin-top:16px; }
  .rsvp-btn{
    flex:1;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .rsvp-btn.active{
    background:var(--accent);
    color:var(--bg);
    border-color:var(--accent);
    font-weight:700;
  }

  /* ---------- auth panel ---------- */
  .auth-copy{ font-size:12px; color:var(--text-dim); margin-bottom:14px; }
  #authForm{ display:flex; gap:8px; }
  .auth-email-input{
    flex:1;
    font-family:var(--font-mono);
    background:var(--surface);
    color:var(--text);
    border:1px solid var(--line);
    padding:0 10px;
    min-height:44px;
    font-size:13px;
  }
  .auth-status{ margin-top:10px; font-size:11px; letter-spacing:0.04em; color:var(--text-dim); }

</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="brand">NACHT<span class="brand-dot">/</span>KAART</div>
    <div class="meta">
      AMSTERDAM<br><span class="dot"></span><span id="clock">UPDATED 20:41:03</span>
      <div class="auth-control" id="authControl"></div>
    </div>
  </header>

  <div class="ticker" aria-label="Tonight's headline events">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

  <nav class="stepper">
    <button class="stepper-btn" id="prevDay" type="button" aria-label="Previous day">‹</button>
    <div class="stepper-label-wrap">
      <button class="stepper-label" id="dateLabel" type="button">TODAY</button>
      <input class="date-picker-input" type="date" id="datePicker" tabindex="-1" aria-hidden="true">
    </div>
    <button class="stepper-btn" id="nextDay" type="button" aria-label="Next day">›</button>
  </nav>

  <div class="geo-notice" id="geoNotice">LOCATION UNAVAILABLE — SORTED FROM AMSTERDAM CENTER</div>

  <div class="map" id="map"></div>

  <main>
    <div class="list-head">
      <span>TIME</span><span>EVENT / VENUE</span><span>LINEUP</span><span>TAGS</span>
    </div>
    <div class="list" id="eventList"></div>
  </main>
</div>

<div class="scrim" id="scrim"></div>
<section class="panel" id="panel" aria-hidden="true">
  <div class="panel-handle"></div>
  <div class="panel-body" id="panelBody"></div>
</section>

<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<div class="scrim" id="authScrim"></div>
<section class="panel" id="authPanel" aria-hidden="true">
  <div class="panel-handle" id="authPanelHandle"></div>
  <div class="panel-body">
    <h2>LOG IN</h2>
    <p class="auth-copy">ENTER YOUR EMAIL. WE'LL SEND YOU A SIGN-IN LINK — NO PASSWORD.</p>
    <form id="authForm">
      <input class="auth-email-input" id="authEmailInput" type="email" placeholder="YOU@EXAMPLE.COM" required autocomplete="email">
      <button class="link-btn" type="submit">SEND LINK</button>
    </form>
    <p class="auth-status" id="authStatusMsg"></p>
  </div>
</section>

<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.6"></script>
<script src="auth.js?v=f1236c8664"></script>
<script src="app.js?v=d858bc71eb"></script>

</body>
</html>
