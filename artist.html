<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NACHTKAART — Artist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json?v=5543d71ab7">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0A0A0A">
<style>
  :root{
    --bg:       #0A0A0A;
    --surface:  #111111;
    --line:     #2A2A2A;
    --text:     #EDEDED;
    --text-dim: #8A8A8A;
    --accent:   #B4FF00;
    --danger:   #FF3B30;
    --font-display: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
    --font-mono: "Space Mono", "JetBrains Mono", ui-monospace, monospace;
  }

  *{ box-sizing:border-box; margin:0; padding:0; border-radius:0 !important; }

  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-mono);
    -webkit-font-smoothing:antialiased;
  }
  body{ min-height:100vh; overflow-x:hidden; }

  a{ color:var(--accent); text-decoration:underline; text-underline-offset:2px; }
  a:hover{ text-decoration:none; }

  :focus-visible{ outline:1px solid var(--accent); outline-offset:2px; }

  .wrap{ max-width:960px; margin:0 auto; padding-bottom:3rem; }

  /* ---------- header ---------- */
  header{
    display:flex; align-items:baseline; justify-content:space-between;
    padding:14px 16px 10px;
    border-bottom:1px solid var(--line);
  }
  .brand{
    font-family:var(--font-display);
    font-weight:700; text-transform:uppercase;
    letter-spacing:-0.02em; font-size:20px;
    color:var(--text); text-decoration:none;
  }
  .brand .brand-dot{ color:var(--accent); }
  .header-right{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .back{
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-dim);
  }
  .auth-control{ display:flex; align-items:center; justify-content:flex-end; gap:8px; }
  .auth-btn{
    font-family:var(--font-mono);
    font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
    background:none; border:1px solid var(--line); color:var(--text-dim);
    padding:2px 8px; min-height:auto; cursor:pointer;
  }
  .auth-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .auth-email{
    font-size:10px; color:var(--text-dim); max-width:120px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* ---------- artist head ---------- */
  .artist-head{ padding:20px 16px 14px; border-bottom:1px solid var(--line); }
  .artist-eyebrow{
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-dim); margin-bottom:6px;
  }
  h1{
    font-family:var(--font-display);
    font-weight:700; text-transform:uppercase; letter-spacing:-0.02em;
    font-size:30px; line-height:1.0;
  }

  .links-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
  .link-btn{
    font-family:var(--font-mono);
    background:var(--surface);
    font-size:11px; letter-spacing:0.06em; text-transform:uppercase;
    padding:8px 12px; border:1px solid var(--line); color:var(--text);
    text-decoration:none; display:inline-flex; align-items:center; min-height:44px;
    cursor:pointer;
  }
  .link-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .link-btn[disabled]{ color:var(--text-dim); cursor:not-allowed; opacity:0.6; }
  .link-btn.active{
    background:var(--accent);
    color:var(--bg);
    border-color:var(--accent);
    font-weight:700;
  }

  /* ---------- gig sections ---------- */
  .section-label{
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-dim); padding:16px 16px 6px;
  }
  .gig{
    display:grid; grid-template-columns:96px 1fr; gap:12px;
    padding:10px 16px; border-bottom:1px solid var(--line);
    background:var(--surface); align-items:baseline;
    color:var(--text);
  }
  .gig:hover{ background:#161616; }
  .gig-date{ font-size:12px; font-weight:700; white-space:nowrap; }
  .gig-title{
    font-family:var(--font-display); font-weight:700; text-transform:uppercase;
    letter-spacing:-0.01em; font-size:14px; display:block;
    color:var(--text); text-decoration:none;
  }
  .gig-title:hover{ color:var(--accent); }
  .gig-venue{ font-size:11px; color:var(--accent); }
  .gig-venue a{ color:var(--accent); }
  .empty{ padding:10px 16px 4px; font-size:12px; color:var(--text-dim); }

  /* ---------- login panel ---------- */
  .scrim{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.6);
    opacity:0; pointer-events:none;
    transition:opacity 0.2s ease;
    z-index:10;
  }
  .scrim.open{ opacity:1; pointer-events:auto; }

  .panel{
    position:fixed; left:0; right:0; bottom:0;
    max-width:960px; margin:0 auto;
    max-height:88vh;
    overflow-y:auto;
    background:var(--bg);
    border-top:1px solid var(--line);
    transform:translateY(100%);
    transition:transform 0.25s ease;
    z-index:11;
  }
  .panel.open{ transform:translateY(0); }

  @media (prefers-reduced-motion: reduce){
    .scrim, .panel{ transition:none; }
  }

  .panel-handle{
    width:36px; height:4px;
    background:var(--line);
    margin:10px auto;
  }

  .panel-body{ padding:0 16px 24px; }

  .panel h2{
    font-family:var(--font-display);
    text-transform:uppercase;
    letter-spacing:-0.02em;
    font-size:22px;
    margin-bottom:2px;
  }

  .auth-copy{ font-size:12px; color:var(--text-dim); margin:8px 0 14px; }
  #authForm{ display:flex; gap:8px; }
  .auth-email-input{
    flex:1;
    font-family:var(--font-mono);
    background:var(--surface);
    color:var(--text);
    border:1px solid var(--line);
    padding:0 10px;
    min-height:44px;
    font-size:13px;
  }
  .auth-status{ margin-top:10px; font-size:11px; letter-spacing:0.04em; color:var(--text-dim); }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <a class="brand" href="index.html">NACHT<span class="brand-dot">/</span>KAART</a>
    <div class="header-right">
      <a class="back" href="index.html">‹ MAP</a>
      <div class="auth-control" id="authControl"></div>
    </div>
  </header>

  <div class="artist-head">
    <div class="artist-eyebrow">ARTIST</div>
    <h1 id="artistName">…</h1>
    <div class="links-row" id="linksRow"></div>
  </div>

  <main id="main"></main>
</div>

<div class="scrim" id="authScrim"></div>
<section class="panel" id="authPanel" aria-hidden="true">
  <div class="panel-handle" id="authPanelHandle"></div>
  <div class="panel-body">
    <h2>LOG IN</h2>
    <p class="auth-copy">ENTER YOUR EMAIL. WE'LL SEND YOU A SIGN-IN LINK — NO PASSWORD.</p>
    <form id="authForm">
      <input class="auth-email-input" id="authEmailInput" type="email" placeholder="YOU@EXAMPLE.COM" required autocomplete="email">
      <button class="link-btn" type="submit">SEND LINK</button>
    </form>
    <p class="auth-status" id="authStatusMsg"></p>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.6"></script>
<script src="auth.js?v=c5a48740f3"></script>
<script src="artist.js?v=83f3ceffae"></script>
</body>
</html>
