name: Scrape RA events

on:
  schedule:
    - cron: "0 4 * * *"   # 06:00 CEST (UTC+2) — correct in summer
    - cron: "0 5 * * *"   # 06:00 CET  (UTC+1) — correct in winter
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-events
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Only proceed if it's really ~06:00 in Amsterdam right now
        run: |
          hour=$(TZ=Europe/Amsterdam date +%H)
          echo "Amsterdam local hour: $hour"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$hour" != "06" ]; then
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP != 'true'

      - uses: actions/setup-python@v5
        if: env.SKIP != 'true'
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt
        if: env.SKIP != 'true'

      - name: Run scraper
        if: env.SKIP != 'true'
        run: python -m scraper.scrape

      - name: Commit data/events.json if it changed
        if: env.SKIP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/events.json; then
            echo "No changes."
          else
            git add data/events.json
            git commit -m "Scrape: update events.json ($(TZ=Europe/Amsterdam date '+%Y-%m-%d %H:%M %Z'))"
            git push origin HEAD:main
          fi
