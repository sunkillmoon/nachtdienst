<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NACHTKAART — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json?v=5543d71ab7">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0A0A0A">
<style>
  :root{
    --bg:       #0A0A0A;
    --surface:  #111111;
    --line:     #2A2A2A;
    --text:     #EDEDED;
    --text-dim: #8A8A8A;
    --accent:   #B4FF00;
    --danger:   #FF3B30;
    --font-display: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
    --font-mono: "Space Mono", "JetBrains Mono", ui-monospace, monospace;
  }

  *{ box-sizing:border-box; margin:0; padding:0; border-radius:0 !important; }

  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-mono);
    -webkit-font-smoothing:antialiased;
  }
  body{ min-height:100vh; overflow-x:hidden; }

  a{ color:var(--accent); text-decoration:underline; text-underline-offset:2px; }
  a:hover{ text-decoration:none; }

  :focus-visible{ outline:1px solid var(--accent); outline-offset:2px; }

  .wrap{ max-width:960px; margin:0 auto; padding-bottom:3rem; }

  /* ---------- header ---------- */
  header{
    display:flex; align-items:baseline; justify-content:space-between;
    padding:14px 16px 10px;
    border-bottom:1px solid var(--line);
  }
  .brand{
    font-family:var(--font-display);
    font-weight:700; text-transform:uppercase;
    letter-spacing:-0.02em; font-size:20px;
    color:var(--text); text-decoration:none;
  }
  .brand .brand-dot{ color:var(--accent); }
  .header-right{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .back{
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-dim);
  }
  .auth-control{ display:flex; align-items:center; justify-content:flex-end; gap:8px; }
  .auth-btn{
    font-family:var(--font-mono);
    font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
    background:none; border:1px solid var(--line); color:var(--text-dim);
    padding:2px 8px; min-height:auto; cursor:pointer;
  }
  .auth-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .auth-email{
    font-size:10px; color:var(--text-dim); max-width:120px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* ---------- head ---------- */
  .entity-head{ padding:20px 16px 14px; border-bottom:1px solid var(--line); }
  .entity-eyebrow{
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-dim); margin-bottom:6px;
  }
  h1{
    font-family:var(--font-display);
    font-weight:700; text-transform:uppercase; letter-spacing:-0.02em;
    font-size:30px; line-height:1.0;
  }
  .profile-email{ font-size:12px; color:var(--accent); margin-top:8px; word-break:break-all; }

  /* ---------- sections + rows ---------- */
  .section-label{
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-dim); padding:18px 16px 6px;
  }
  .empty{ padding:6px 16px 4px; font-size:12px; color:var(--text-dim); }

  /* follow/venue rows: name + inline action */
  .prow{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:10px 16px; border-bottom:1px solid var(--line); background:var(--surface);
  }
  .prow-main{ min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .prow-name{
    font-family:var(--font-display); font-weight:700; text-transform:uppercase;
    letter-spacing:-0.01em; font-size:14px;
  }
  .prow-action{
    flex:none;
    font-family:var(--font-mono);
    font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
    background:none; border:1px solid var(--line); color:var(--text-dim);
    padding:5px 9px; min-height:auto; cursor:pointer;
  }
  .prow-action:hover{ border-color:var(--accent); color:var(--accent); }

  /* event rows: date + title + venue */
  .gig{
    display:grid; grid-template-columns:96px 1fr; gap:12px;
    padding:10px 16px; border-bottom:1px solid var(--line);
    background:var(--surface); align-items:baseline;
  }
  .gig-date{ font-size:12px; font-weight:700; white-space:nowrap; color:var(--text); }
  .gig-title{
    font-family:var(--font-display); font-weight:700; text-transform:uppercase;
    letter-spacing:-0.01em; font-size:14px; display:block;
    color:var(--text); text-decoration:none;
  }
  .gig-title:hover{ color:var(--accent); }
  .gig-sub{ font-size:11px; color:var(--text-dim); }
  .gig-sub a{ color:var(--accent); }
  .gig.unresolved .gig-title{ color:var(--text-dim); }

  .load-more{
    display:block; width:calc(100% - 32px); margin:10px 16px 0;
    font-family:var(--font-mono);
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    background:var(--surface); color:var(--text); border:1px solid var(--line);
    padding:10px; min-height:44px; cursor:pointer;
  }
  .load-more:hover{ border-color:var(--accent); color:var(--accent); }

  /* ---------- diary rows ---------- */
  .gig-note{ display:block; font-size:12px; color:var(--text-dim); margin-top:3px; }
  .gig-tags{ display:flex; align-items:center; gap:8px; margin-top:6px; }
  .tag-diary{
    font-size:9px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--bg); background:var(--text-dim); padding:2px 6px;
  }

  /* ---------- add past event ---------- */
  .add-past{ padding:8px 16px 4px; }
  .add-panel{ padding:6px 16px 12px; border-bottom:1px solid var(--line); background:var(--surface); }
  .add-panel.hidden{ display:none; }
  .add-tabs{ display:flex; gap:8px; margin-bottom:10px; }
  .add-tab{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase;
    background:none; border:1px solid var(--line); color:var(--text-dim);
    padding:6px 10px; min-height:auto; cursor:pointer;
  }
  .add-tab.active{ background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:700; }
  .add-mode.hidden{ display:none; }
  .add-input{
    display:block; width:100%; font-family:var(--font-mono);
    background:var(--bg); color:var(--text); border:1px solid var(--line);
    padding:0 10px; min-height:40px; font-size:13px; margin-bottom:8px;
    letter-spacing:0.04em;
  }
  .add-dates{ display:flex; gap:8px; }
  .add-dates .add-input{ flex:1; }
  .add-status{ font-size:11px; color:var(--text-dim); letter-spacing:0.04em; }

  .search-result{
    display:grid; grid-template-columns:96px 1fr; gap:12px; width:100%; text-align:left;
    background:var(--bg); border:none; border-top:1px solid var(--line); color:var(--text);
    padding:8px 0; min-height:auto; cursor:pointer;
  }
  .search-result:hover{ background:#161616; }
  .sr-date{ font-size:12px; font-weight:700; white-space:nowrap; }
  .sr-title{ font-family:var(--font-display); font-weight:700; text-transform:uppercase; font-size:13px; display:block; }
  .sr-venue{ font-size:11px; color:var(--accent); }

  .ac-field{ position:relative; }
  .ac-drop{
    display:none; position:absolute; left:0; right:0; top:40px; z-index:5;
    background:var(--bg); border:1px solid var(--line); max-height:200px; overflow-y:auto;
  }
  .ac-drop.open{ display:block; }
  .ac-item{
    display:block; width:100%; text-align:left; font-family:var(--font-mono); font-size:12px;
    background:var(--bg); color:var(--text); border:none; border-bottom:1px solid var(--line);
    padding:8px 10px; min-height:auto; cursor:pointer;
  }
  .ac-item:hover{ background:#161616; color:var(--accent); }

  .chips{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    font-size:11px; letter-spacing:0.04em; text-transform:uppercase;
    border:1px solid var(--line); padding:4px 6px 4px 8px; color:var(--text);
  }
  .chip-x{
    font-family:var(--font-mono); background:none; border:none; color:var(--text-dim);
    cursor:pointer; min-height:auto; padding:0 2px; font-size:15px; line-height:1;
  }
  .chip-x:hover{ color:var(--accent); }

  /* ---------- account / hygiene ---------- */
  .account{ padding:0 16px; margin-top:8px; }
  .account-actions{ display:flex; gap:8px; flex-wrap:wrap; }
  .link-btn{
    font-family:var(--font-mono);
    background:var(--surface);
    font-size:11px; letter-spacing:0.06em; text-transform:uppercase;
    padding:8px 12px; border:1px solid var(--line); color:var(--text);
    text-decoration:none; display:inline-flex; align-items:center; min-height:44px;
    cursor:pointer;
  }
  .link-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .link-btn[disabled]{ color:var(--text-dim); cursor:default; opacity:0.6; }
  .link-btn[disabled]:hover{ border-color:var(--line); color:var(--text-dim); }

  .delete-confirm{ margin-top:12px; }
  .delete-confirm.hidden{ display:none; }
  .delete-warn{ font-size:12px; color:var(--text-dim); margin-bottom:10px; line-height:1.5; }
  .delete-row{ display:flex; gap:8px; }
  .delete-input{
    flex:1; font-family:var(--font-mono);
    background:var(--surface); color:var(--text); border:1px solid var(--line);
    padding:0 10px; min-height:44px; font-size:13px; letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .delete-status{ margin-top:10px; font-size:11px; letter-spacing:0.04em; color:var(--text-dim); }

  /* ---------- login panel ---------- */
  .scrim{
    position:fixed; inset:0; background:rgba(0,0,0,0.6);
    opacity:0; pointer-events:none; transition:opacity 0.2s ease; z-index:10;
  }
  .scrim.open{ opacity:1; pointer-events:auto; }
  .panel{
    position:fixed; left:0; right:0; bottom:0;
    max-width:960px; margin:0 auto; max-height:88vh; overflow-y:auto;
    background:var(--bg); border-top:1px solid var(--line);
    transform:translateY(100%); transition:transform 0.25s ease; z-index:11;
  }
  .panel.open{ transform:translateY(0); }
  @media (prefers-reduced-motion: reduce){ .scrim, .panel{ transition:none; } }
  .panel-handle{ width:36px; height:4px; background:var(--line); margin:10px auto; }
  .panel-body{ padding:0 16px 24px; }
  .panel h2{
    font-family:var(--font-display); text-transform:uppercase;
    letter-spacing:-0.02em; font-size:22px; margin-bottom:2px;
  }
  .auth-copy{ font-size:12px; color:var(--text-dim); margin:8px 0 14px; }
  #authForm{ display:flex; gap:8px; }
  .auth-email-input{
    flex:1; font-family:var(--font-mono);
    background:var(--surface); color:var(--text); border:1px solid var(--line);
    padding:0 10px; min-height:44px; font-size:13px;
  }
  .auth-status{ margin-top:10px; font-size:11px; letter-spacing:0.04em; color:var(--text-dim); }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <a class="brand" href="index.html">NACHT<span class="brand-dot">/</span>KAART</a>
    <div class="header-right">
      <a class="back" href="index.html">‹ MAP</a>
      <div class="auth-control" id="authControl"></div>
    </div>
  </header>

  <div class="entity-head">
    <div class="entity-eyebrow">PROFILE</div>
    <h1>YOUR NIGHTS</h1>
    <div class="profile-email" id="profileEmail"></div>
  </div>

  <main id="main"></main>
</div>

<div class="scrim" id="authScrim"></div>
<section class="panel" id="authPanel" aria-hidden="true">
  <div class="panel-handle" id="authPanelHandle"></div>
  <div class="panel-body">
    <h2>LOG IN</h2>
    <p class="auth-copy">ENTER YOUR EMAIL. WE'LL SEND YOU A SIGN-IN LINK — NO PASSWORD.</p>
    <form id="authForm">
      <input class="auth-email-input" id="authEmailInput" type="email" placeholder="YOU@EXAMPLE.COM" required autocomplete="email">
      <button class="link-btn" type="submit">SEND LINK</button>
    </form>
    <p class="auth-status" id="authStatusMsg"></p>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.6"></script>
<script src="auth.js?v=e296453e51"></script>
<script src="profile.js?v=897bf8b56f"></script>
</body>
</html>
